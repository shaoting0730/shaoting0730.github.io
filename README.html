<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Cyber Future</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    height:100vh;
    overflow:hidden;

    background:
    radial-gradient(circle at top,#1a1a4d,#050510);

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'Orbitron',sans-serif;

    color:white;

}


/* 星空粒子 */

canvas{

    position:absolute;
    inset:0;

}


/* 主卡片 */

.container{


    width:520px;
    padding:50px;


    background:
    rgba(255,255,255,.08);


    border-radius:30px;


    backdrop-filter:blur(25px);


    border:1px solid rgba(255,255,255,.2);


    box-shadow:

    0 0 50px rgba(0,255,255,.3),
    inset 0 0 40px rgba(255,255,255,.05);


    text-align:center;


    position:relative;


    animation:

    float 5s infinite ease-in-out;


}


/* 彩虹边框 */

.container::before{


content:"";

position:absolute;

inset:-3px;

border-radius:32px;


background:

linear-gradient(
45deg,
#00ffff,
#ff00ff,
#ffff00,
#00ffff
);


z-index:-1;


filter:blur(20px);


animation:
rotate 5s linear infinite;


}



h1{


font-size:48px;


letter-spacing:8px;


background:

linear-gradient(
90deg,
#00ffff,
#ff00ff
);


-webkit-background-clip:text;

color:transparent;


text-shadow:

0 0 30px cyan;


}


p{


margin-top:25px;

font-size:16px;

color:#ddd;

line-height:2;


}



/* 按钮 */


button{


margin-top:35px;


padding:

15px 40px;


border-radius:50px;


border:none;


background:

linear-gradient(
90deg,
#00ffff,
#ff00ff
);


color:white;


font-size:18px;


cursor:pointer;


box-shadow:

0 0 30px cyan;


transition:.3s;


}


button:hover{


transform:

scale(1.15);


box-shadow:

0 0 60px magenta;


}




@keyframes float{


50%{

transform:

translateY(-20px);

}


}



@keyframes rotate{


100%{

transform:

rotate(360deg);

}


}




/* 鼠标光 */


.light{


position:absolute;


width:300px;

height:300px;


background:

radial-gradient(
circle,
rgba(0,255,255,.35),
transparent 70%
);


pointer-events:none;


transform:

translate(-50%,-50%);


}



</style>

</head>

<body>

<canvas id="space"></canvas>

<div class="light"></div>

<div class="container">

<h1>
CYBER
</h1>

<p>

未来科技 · AI · Web · Flutter

<br>

Create Something Amazing

</p>

<button>
ENTER
</button>

</div>

<script>


// 粒子背景

const canvas=document.querySelector("#space");

const ctx=canvas.getContext("2d");


canvas.width=innerWidth;
canvas.height=innerHeight;


let stars=[];


for(let i=0;i<200;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2,

speed:Math.random()*0.5

});

}



function draw(){


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);


ctx.fillStyle="white";


stars.forEach(s=>{


ctx.beginPath();


ctx.arc(
s.x,
s.y,
s.r,
0,
Math.PI*2
);


ctx.fill();



s.y+=s.speed;


if(s.y>canvas.height)
s.y=0;



});


requestAnimationFrame(draw);


}


draw();



// 鼠标光效

const light=document.querySelector(".light");


document.addEventListener(
"mousemove",
e=>{


light.style.left=e.clientX+"px";

light.style.top=e.clientY+"px";


}

);



</script>

</body>

</html>
